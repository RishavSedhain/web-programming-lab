<!DOCTYPE html>
<html>
<head>
    <title>Block and Inline Elements</title>
    <style>
        .box {
            background-color: orange;
            padding: 15px;
        }
        .price {
            color: white;
            background-color: black;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="box">
        Product Price: <span class="price">$500</span>
    </div>
</body>
</html>
