<!DOCTYPE html>
<html>
<head>
    <title>Element-Prefixed Class Selector</title>
    <style>
        h2.blue {
            color: blue;
        }
        p.blue {
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <h2 class="blue">Blue Heading</h2>
    <p class="blue">Blue Paragraph</p>
</body>
</html>
