<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>LA4 Q4 - Grade Calculator</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .container { max-width: 700px; margin: auto; text-align: center; }
    input, button { margin: 8px; padding: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const [mark1, setMark1] = React.useState("");
      const [mark2, setMark2] = React.useState("");
      const [mark3, setMark3] = React.useState("");
      const [grade, setGrade] = React.useState("");

      const calculateGrade = () => {
        const average = (Number(mark1) + Number(mark2) + Number(mark3)) / 3;

        if (average >= 90) {
          setGrade("A");
        } else if (average >= 75) {
          setGrade("B");
        } else if (average >= 60) {
          setGrade("C");
        } else {
          setGrade("D");
        }
      };

      return (
        <div className="container">
          <h1>React Lab - Rishav Sedhain (24BCE2974)</h1>
          <h2>Grade Calculator</h2>

          <input type="number" placeholder="Enter mark 1" value={mark1} onChange={(e) => setMark1(e.target.value)} />
          <input type="number" placeholder="Enter mark 2" value={mark2} onChange={(e) => setMark2(e.target.value)} />
          <input type="number" placeholder="Enter mark 3" value={mark3} onChange={(e) => setMark3(e.target.value)} />

          <div>
            <button onClick={calculateGrade}>Calculate Grade</button>
          </div>

          <h3>Grade: {grade}</h3>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
