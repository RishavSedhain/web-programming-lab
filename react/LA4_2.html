<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>LA4 Q2 - Calculator</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .container { max-width: 700px; margin: auto; text-align: center; }
    input, button { margin: 8px; padding: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const [a, setA] = React.useState("");
      const [b, setB] = React.useState("");
      const [result, setResult] = React.useState(0);

      const add = () => setResult(Number(a) + Number(b));
      const subtract = () => setResult(Number(a) - Number(b));

      return (
        <div className="container">
          <h1>React Lab - Rishav Sedhain (24BCE2974)</h1>
          <h2>Basic Calculator</h2>

          <input
            type="number"
            placeholder="Enter first number"
            value={a}
            onChange={(e) => setA(e.target.value)}
          />

          <input
            type="number"
            placeholder="Enter second number"
            value={b}
            onChange={(e) => setB(e.target.value)}
          />

          <div>
            <button onClick={add}>Add</button>
            <button onClick={subtract}>Subtract</button>
          </div>

          <h3>Result: {result}</h3>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
