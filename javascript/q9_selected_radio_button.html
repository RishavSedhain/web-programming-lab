<!DOCTYPE html>
<html>
<head>
    <title>Selected Radio Button</title>
    <script>
        function showSelectedColor() {
            var colors = document.getElementsByName("color");
            var selectedColor = "";

            for (var i = 0; i < colors.length; i++) {
                if (colors[i].checked) {
                    selectedColor = colors[i].value;
                    break;
                }
            }

            document.getElementById("result").innerHTML = "Selected Color: " + selectedColor;
        }
    </script>
</head>
<body>
    <h3>Select a Color</h3>

    <input type="radio" name="color" value="Red"> Red
    <input type="radio" name="color" value="Green"> Green
    <input type="radio" name="color" value="Blue"> Blue
    <br><br>

    <button type="button" onclick="showSelectedColor()">Show Selected Color</button>
    <p id="result"></p>
</body>
</html>
