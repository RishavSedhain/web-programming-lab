<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <script>
        function calculate(operation) {
            var n1 = parseFloat(document.getElementById("num1").value);
            var n2 = parseFloat(document.getElementById("num2").value);
            var result;

            switch (operation) {
                case "+":
                    result = n1 + n2;
                    break;
                case "-":
                    result = n1 - n2;
                    break;
                case "*":
                    result = n1 * n2;
                    break;
                case "/":
                    result = (n2 === 0) ? "Division by zero is not allowed." : (n1 / n2);
                    break;
            }

            document.getElementById("result").innerHTML = "Result: " + result;
        }
    </script>
</head>
<body>
    <h3>Simple Calculator</h3>
    <form>
        <label>First Number:</label>
        <input type="number" id="num1" step="any"><br><br>

        <label>Second Number:</label>
        <input type="number" id="num2" step="any"><br><br>

        <input type="button" value="Add" onclick="calculate('+')">
        <input type="button" value="Subtract" onclick="calculate('-')">
        <input type="button" value="Multiply" onclick="calculate('*')">
        <input type="button" value="Divide" onclick="calculate('/')">
    </form>
    <p id="result"></p>
</body>
</html>
